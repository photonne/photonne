services:
  photonne-api:
    image: ghcr.io/photonne/photonne:latest
    container_name: photonne-api
    ports:
      - "${API_PORT:-1107}:8080"
    environment:
      - ConnectionStrings__Postgres=Host=photonne-db;Port=5432;Database=${POSTGRES_DB:-photonne};Username=${POSTGRES_USER:-photonne_user};Password=${POSTGRES_PASSWORD:-photonne_password}
      - Jwt__Key=${JWT_KEY:-TOKEN_SUPER_SECRET}
      - Jwt__Issuer=Photonne
      - Jwt__Audience=Photonne
      - HTTPS_REDIRECT=${HTTPS_REDIRECT:-false}
      - AdminUser__Username=${ADMIN_USERNAME:-admin}
      - AdminUser__Email=${ADMIN_EMAIL:-admin@photonne.local}
      - AdminUser__Password=${ADMIN_PASSWORD:-admin123}
      - AdminUser__FirstName=${ADMIN_FIRSTNAME:-Administrador}
      - AdminUser__LastName=${ADMIN_LASTNAME:-Sistema}
      - Ml__ServiceUrl=${ML_SERVICE_URL:-${FACE_SERVICE_URL:-http://photonne-ml:8000}}
      - Ml__FaceRecognition__Enabled=${FACE_RECOGNITION_ENABLED:-true}
      - Ml__ObjectDetection__Enabled=${OBJECT_DETECTION_ENABLED:-${OBJECT_RECOGNITION_ENABLED:-true}}
      - Ml__SceneClassification__Enabled=${SCENE_CLASSIFICATION_ENABLED:-${SCENE_RECOGNITION_ENABLED:-true}}
      - Ml__TextRecognition__Enabled=${TEXT_RECOGNITION_ENABLED:-true}
    volumes:
      - ${ASSETS_HOST_PATH:-./data/photos}:/data/assets
      - ${THUMBNAILS_HOST_PATH:-./data/thumbnails}:/data/thumbnails
    depends_on:
      postgresql:
        condition: service_healthy
      photonne-ml:
        condition: service_healthy
    restart: unless-stopped

  photonne-ml:
    image: ghcr.io/photonne/photonne-ml:latest
    container_name: photonne-ml
    ports:
      - "${ML_PORT:-8000}:8000"
    environment:
      - FACE_ENABLED=${FACE_RECOGNITION_ENABLED:-true}
      - FACE_MODEL_NAME=${FACE_MODEL_NAME:-buffalo_l}
      - FACE_DET_SIZE=${FACE_DET_SIZE:-640}
      - FACE_MIN_SIZE=${FACE_MIN_SIZE:-40}
      - FACE_MIN_DET_SCORE=${FACE_MIN_DET_SCORE:-0.5}
      - OBJECT_ENABLED=${OBJECT_DETECTION_ENABLED:-${OBJECT_RECOGNITION_ENABLED:-true}}
      - OBJECT_MODEL_PATH=${OBJECT_MODEL_PATH:-/app/models/yolov8n.onnx}
      - OBJECT_MIN_SCORE=${OBJECT_MIN_SCORE:-0.25}
      - OBJECT_IOU=${OBJECT_IOU:-0.45}
      - SCENE_ENABLED=${SCENE_CLASSIFICATION_ENABLED:-${SCENE_RECOGNITION_ENABLED:-true}}
      - SCENE_MODEL_PATH=${SCENE_MODEL_PATH:-/app/models/scene_classifier.onnx}
      - SCENE_TOP_K=${SCENE_TOP_K:-3}
      - SCENE_MIN_SCORE=${SCENE_MIN_SCORE:-0.15}
      - TEXT_ENABLED=${TEXT_RECOGNITION_ENABLED:-true}
      - TEXT_MIN_SCORE=${TEXT_MIN_SCORE:-0.5}
      - TEXT_MAX_LINES=${TEXT_MAX_LINES:-200}
      - ONNX_PROVIDERS=${ML_ONNX_PROVIDERS:-${FACE_ONNX_PROVIDERS:-CPUExecutionProvider}}
    volumes:
      - ${ASSETS_HOST_PATH:-./data/photos}:/data/assets:ro
      - ${THUMBNAILS_HOST_PATH:-./data/thumbnails}:/data/thumbnails:ro
      - ml_models:/app/models
    restart: unless-stopped

  postgresql:
    image: pgvector/pgvector:pg17
    container_name: photonne-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-photonne}
      - POSTGRES_USER=${POSTGRES_USER:-photonne_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-photonne_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-photonne_user} -d $${POSTGRES_DB:-photonne}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: photonne-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgresql_data:
  pgadmin_data:
  ml_models:
