name: Docker Image CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      # QEMU enables building the arm64 leg via user-mode emulation on the
      # amd64 runner. Needed because we publish a single manifest list with
      # both architectures so self-hosters on Raspberry Pi / ARM NAS / Apple
      # Silicon pull a native image instead of running amd64 under Rosetta.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/photonne
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Src/Photonne.Server.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-ml:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      # Same QEMU + multi-arch publish as the API job. Note: the arm64 leg of
      # this build runs torch + ultralytics + CLIP/YOLO ONNX exports under
      # user-mode emulation, so wall time is ~3-4× the amd64 leg (typically
      # 25-40 min vs 8-12 min). Acceptable for a `main` push.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/photonne-ml
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: Src/Photonne.MlService
          file: Src/Photonne.MlService/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ml
          cache-to: type=gha,mode=max,scope=ml
