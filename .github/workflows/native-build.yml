name: Native client build

on:
  push:
    branches: [main]
    paths:
      - 'Src/Photonne.Client.Native/**'
      - '.github/workflows/native-build.yml'
  pull_request:
    paths:
      - 'Src/Photonne.Client.Native/**'
      - '.github/workflows/native-build.yml'

concurrency:
  group: native-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile common + desktop + android (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Src/Photonne.Client.Native
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compile Desktop
        run: ./gradlew :composeApp:compileKotlinDesktop --stacktrace

      - name: Compile Android (debug)
        run: ./gradlew :composeApp:compileDebugKotlinAndroid --stacktrace

      - name: Run common tests on JVM
        run: ./gradlew :composeApp:desktopTest --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-test-reports
          path: Src/Photonne.Client.Native/composeApp/build/reports/
          retention-days: 7
