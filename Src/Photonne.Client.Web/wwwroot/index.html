<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FFD166" />
    <title>Photonne - Gestión de Fotografías</title>
    <base href="/" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="192x192" href="dark/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css?v=1" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="" />
    <link rel="stylesheet" href="css/app.css" />
    <link id="favicon" rel="icon" type="image/png" href="dark/favicon.png" />
    <link href="Photonne.Client.Web.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="js/scrollHelpers.js"></script>
    <script src="js/mapHelpers.js"></script>
    <script src="js/assetHelpers.js"></script>
    <script>window.APP_VERSION = '1.1.0';</script>
    <script src="js/pwaUpdateHelper.js"></script>
    <script src="js/cacheHelper.js"></script>
    <script src="js/folderPicker.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
    <script src="_content/MudBlazor/MudBlazor.min.js?v=1"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
    <script>
        (function () {
            var stored = localStorage.getItem('isDarkMode');
            var isDark = stored === null ? true : stored !== 'false';
            var theme = isDark ? 'dark' : 'light';
            document.getElementById('favicon').href = theme + '/favicon.png';
            var apple = document.querySelector('link[rel="apple-touch-icon"]');
            if (apple) apple.href = theme + '/icon-192.png';
        })();
    </script>
</body>

</html>
