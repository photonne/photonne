# Aplicado automáticamente en desarrollo (docker compose up).
# En producción (NAS) solo se usa docker-compose.yml.
services:
  photonne-api:
    build:
      context: .
      dockerfile: Src/Photonne.Server.Api/Dockerfile
    pull_policy: build
    # Puerto único compartido con producción: ${API_PORT:-1107} viene del base
    # compose. Cámbialo desde .env si choca con otro servicio (en macOS, evita
    # el 5000 porque AirPlay Receiver lo ocupa por defecto).
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Key=${JWT_KEY:-dev-secret-key-change-in-production-min-32-chars}
      - AdminUser__Password=${ADMIN_PASSWORD:-admin123}

  photonne-ml:
    build:
      context: ./Src/Photonne.MlService
      args:
        STRICT_CLIP_BAKE: "1"
    pull_policy: build

volumes:
  pgadmin_data:
